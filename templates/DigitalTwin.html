<!DOCTYPE html>
<html>
<head>
    <title>Digital Twin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            border-radius: 10px;
        }

        .temp {
            font-size: 40px;
            color: #38bdf8;
        }

        canvas {
            background: white;
            border-radius: 10px;
            padding: 10px;
        }
    </style>
</head>

<body>

    <h1>🌡 Digital Twin Dashboard</h1>

    <div class="card">
        <h3>Current Temperature</h3>
        <div class="temp">{{ latest_temp }} °C</div>
    </div>

    <h3>Temperature Trend</h3>

    <canvas id="tempChart" width="700" height="350"></canvas>

    <script>
        const temps = {{ temperatures | tojson }};
        const times = {{ timestamps | tojson }};

        const ctx = document.getElementById('tempChart');

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: times,
                datasets: [{
                    label: 'Temperature (°C)',
                    data: temps,
                    borderColor: '#38bdf8',
                    tension: 0.3,
                    fill: false
                }]
            },
            options: {
                scales: {
                    x: {
                        ticks: {
                            color: 'black'
                        }
                    },
                    y: {
                        ticks: {
                            color: 'black'
                        }
                    }
                }
            }
        });

        // 🔥 自动刷新（关键）
        setTimeout(() => {
            location.reload();
        }, 3000);
    </script>

</body>
</html>
